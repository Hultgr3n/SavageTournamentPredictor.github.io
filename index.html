<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Savage Predictor 2026 – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-dark">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg" style="width:100%;max-width:420px;">
    <div class="card-header bg-success text-white text-center py-4">
      <h2 class="mb-0">⚽ Savage Predictor</h2>
      <small>FIFA World Cup 2026</small>
    </div>
    <div class="card-body p-4">

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-4" id="authTabs">
        <li class="nav-item">
          <button class="nav-link active" id="tab-login" onclick="showTab('login')">Login</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="tab-register" onclick="showTab('register')">Register</button>
        </li>
      </ul>

      <!-- Login form -->
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" id="login-username" class="form-control" placeholder="your username" required autocomplete="username"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <div id="login-error" class="alert alert-danger d-none"></div>
        <button type="submit" class="btn btn-success w-100" id="login-btn">Login</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="d-none" onsubmit="doRegister(event)">
        <div class="mb-3">
          <label class="form-label">Username <small class="text-muted">(displayed on leaderboard)</small></label>
          <input type="text" id="reg-username" class="form-control" placeholder="choose a username"
                 pattern="[A-Za-z0-9_\-]+" title="Letters, numbers, _ and - only" required minlength="3" maxlength="20"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="reg-password" class="form-control" placeholder="min 6 characters" required minlength="6" autocomplete="new-password"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="reg-password2" class="form-control" placeholder="repeat password" required autocomplete="new-password"/>
        </div>
        <div id="reg-error" class="alert alert-danger d-none"></div>
        <button type="submit" class="btn btn-success w-100" id="reg-btn">Create Account</button>
      </form>

    </div>
  </div>
</div>

<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let suppressAutoRedirect = false;

  // If already logged in from a previous session, go straight to predictions.
  // During active login/register we suppress this to avoid redirecting before profile sync is complete.
  auth.onAuthStateChanged(user => {
    if (user && !suppressAutoRedirect) window.location.href = 'predictions.html';
  });

  function showTab(tab) {
    document.getElementById('login-form').classList.toggle('d-none', tab !== 'login');
    document.getElementById('register-form').classList.toggle('d-none', tab !== 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  /** Convert username → fake email for Firebase Auth */
  function usernameToEmail(username) {
    return username.toLowerCase().replace(/[^a-z0-9_\-]/g, '') + '@savage.predictor';
  }

  async function ensureUserProfile(uid, username) {
    const normalized = username.toLowerCase();
    const userRef = db.collection('users').doc(uid);
    const usernameRef = db.collection('usernames').doc(normalized);

    const userSnap = await userRef.get();
    if (!userSnap.exists) {
      await userRef.set({
        username,
        isAdmin: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    } else {
      const existing = userSnap.data() || {};
      if (!existing.username) {
        await userRef.set({ username }, { merge: true });
      }
    }

    const usernameSnap = await usernameRef.get();
    if (!usernameSnap.exists) {
      await usernameRef.set({ uid });
    }
  }

  async function doLogin(e) {
    e.preventDefault();
    suppressAutoRedirect = true;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.classList.add('d-none');
    btn.disabled = true; btn.textContent = 'Logging in…';
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    try {
      const cred = await auth.signInWithEmailAndPassword(usernameToEmail(username), password);
      await ensureUserProfile(cred.user.uid, username);
      window.location.href = 'predictions.html';
    } catch (ex) {
      const code = ex?.code || '';
      if (code.includes('auth/')) {
        err.textContent = 'Invalid username or password.';
      } else {
        err.textContent = 'Login succeeded, but profile sync failed. Check Firestore rules.';
      }
      err.classList.remove('d-none');
      btn.disabled = false; btn.textContent = 'Login';
      suppressAutoRedirect = false;
    }
  }

  async function doRegister(e) {
    e.preventDefault();
    suppressAutoRedirect = true;
    const btn = document.getElementById('reg-btn');
    const err = document.getElementById('reg-error');
    err.classList.add('d-none');
    const username  = document.getElementById('reg-username').value.trim();
    const password  = document.getElementById('reg-password').value;
    const password2 = document.getElementById('reg-password2').value;
    if (password !== password2) {
      err.textContent = 'Passwords do not match.'; err.classList.remove('d-none'); return;
    }
    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      // Check username uniqueness
      const existing = await db.collection('usernames').doc(username.toLowerCase()).get();
      if (existing.exists) {
        err.textContent = 'Username already taken. Please choose another.';
        err.classList.remove('d-none');
        btn.disabled = false; btn.textContent = 'Create Account';
        suppressAutoRedirect = false;
        return;
      }
      const cred = await auth.createUserWithEmailAndPassword(usernameToEmail(username), password);
      await cred.user.getIdToken(true);
      await ensureUserProfile(cred.user.uid, username);
      window.location.href = 'predictions.html';
    } catch (ex) {
      err.textContent = ex.message || 'Registration failed.';
      err.classList.remove('d-none');
      btn.disabled = false; btn.textContent = 'Create Account';
      suppressAutoRedirect = false;
    }
  }
</script>
</body>
</html>
